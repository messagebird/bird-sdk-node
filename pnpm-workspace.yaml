# Promoted to the export root on release (.mirror/ -> root). The mirror is a
# pnpm workspace whose members are the published packages under packages/* and
# each package's nested `examples` package. The examples package's devDeps
# (bun-types, the web framework typings) are what the example typecheck
# (`tsc -p examples/tsconfig.json`, part of a package's `pnpm run lint`) needs
# installed; without it the lint fails (TS2688: cannot find type definition file
# for 'bun-types'). It also lets `examples`' `workspace:*` dep resolve to its
# sibling package within the workspace.
packages:
  - "packages/*"
  - "packages/*/examples"
# esbuild and sharp need their build scripts (native binary) for the release build.
allowBuilds:
  esbuild: true
  sharp: true
