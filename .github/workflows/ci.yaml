# CI for the bird-sdk-node release mirror. Proof that the exported workspace
# installs, builds, lints, and tests every package under packages/* with NO Bird
# monorepo context — it runs on a GitHub-hosted runner against the checked-in
# mirror content only.
#
# Source of truth: clients/typescript/.mirror/ in the Bird monorepo. Do not edit
# on the mirror; changes are synced from the monorepo.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.1.1
      - uses: actions/setup-node@v6
        with:
          node-version: 22.19.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run lint
      - run: pnpm run test
      # Packaging correctness (export map / files) per package, and the
      # single-source guarantee that the repo-root README is the SDK's README.
      - run: pnpm run publint
      - run: pnpm run check:readme
