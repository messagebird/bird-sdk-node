# Promoted to the export root on release (.mirror/ -> root). The published SDK
# ships `examples/` as a nested pnpm package whose devDeps (bun-types, the web
# framework typings) the example typecheck — `tsc -p examples/tsconfig.json`,
# part of `pnpm run lint` — needs installed. In the monorepo that package is a
# member of the repo-root workspace; the standalone mirror has no such root, so
# without this file the examples package is never installed and the lint fails
# (TS2688: cannot find type definition file for 'bun-types'). It also lets
# examples' `@messagebird/sdk: workspace:*` resolve to the root SDK package.
packages:
  - "examples"
# pnpm 10+ blocks dependency build scripts unless allow-listed; the mirror's
# release install runs --frozen-lockfile, which errors on the ignored builds.
# esbuild and sharp need their postinstall (platform binary) for `pnpm run build`.
onlyBuiltDependencies:
  - esbuild
  - sharp
