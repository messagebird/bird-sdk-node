# CI for the bird-sdk-node release mirror. This file is the proof that the
# exported tree installs, builds, and tests with NO Bird monorepo context — it
# runs on a GitHub-hosted runner against the checked-in mirror content only.
#
# Source of truth: clients/sdk-typescript/.mirror/ in the Bird monorepo. Do not
# edit on the mirror; changes are synced from the monorepo.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.1.1
      - uses: actions/setup-node@v6
        with:
          node-version: 22.19.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run lint
      - run: pnpm run test
